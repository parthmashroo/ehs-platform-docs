<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview Prep — Parth Mashroo</title>
  <style>
    :root {
      --bg: #f0ebe2;
      --card: #ffffff;
      --border: #e2ddd6;
      --text: #1a1a2e;
      --muted: #94a3b8;
      --secondary: #64748b;
      --active-bg: #1e293b;
      --active-text: #ffffff;
      --radius: 12px;
      --radius-lg: 20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .wrap { max-width: 860px; margin: 0 auto; padding: 0 28px; }

    /* HEADER */
    .header { display: flex; align-items: center; justify-content: space-between; padding: 28px 28px 0; max-width: 860px; margin: 0 auto; }
    .header-title { font-size: 22px; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .card-counter { font-size: 14px; color: var(--secondary); font-weight: 500; }
    .view-btn { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text); transition: all 0.15s; }
    .view-btn:hover { background: #f5f0e8; }
    .view-btn.active { background: var(--active-bg); color: var(--active-text); border-color: var(--active-bg); }

    /* SCORES */
    .scores { display: flex; gap: 12px; padding: 20px 28px; max-width: 860px; margin: 0 auto; }
    .score-box { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 12px; text-align: center; }
    .score-num { font-size: 30px; font-weight: 700; line-height: 1; }
    .score-num.g { color: #16a34a; }
    .score-num.b { color: #2563eb; }
    .score-num.r { color: #dc2626; }
    .score-lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* FILTERS */
    .filters { padding: 0 28px 16px; max-width: 860px; margin: 0 auto; }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .fbtn {
      padding: 7px 16px; border-radius: 999px; border: 1px solid var(--border);
      background: var(--card); font-size: 13px; font-weight: 500; cursor: pointer;
      color: var(--text); transition: all 0.15s; white-space: nowrap;
    }
    .fbtn:hover { border-color: #94a3b8; }
    .fbtn.on { background: var(--active-bg); color: white; border-color: var(--active-bg); }
    .fbtn.l-basic.on { background: #16a34a; border-color: #16a34a; }
    .fbtn.l-medium.on { background: #d97706; border-color: #d97706; }
    .fbtn.l-advanced.on { background: #dc2626; border-color: #dc2626; }

    /* CARD VIEW */
    .card-view { padding: 0 28px 16px; max-width: 860px; margin: 0 auto; }
    .q-card {
      background: var(--card); border-radius: var(--radius-lg);
      box-shadow: 0 4px 24px rgba(0,0,0,0.10); padding: 40px;
      min-height: 280px; display: flex; flex-direction: column;
    }
    .q-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 14px; }
    .q-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .tag { padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .t-about    { background: #ede9fe; color: #6d28d9; }
    .t-dotnet   { background: #f3e8ff; color: #7c3aed; }
    .t-sql      { background: #ccfbf1; color: #0f766e; }
    .t-system   { background: #fef3c7; color: #92400e; }
    .t-behaviour{ background: #ffe4e6; color: #be123c; }
    .t-remote   { background: #e0f2fe; color: #0369a1; }
    .t-basic    { background: #dcfce7; color: #166534; }
    .t-medium   { background: #fef9c3; color: #854d0e; }
    .t-advanced { background: #fee2e2; color: #991b1b; }
    .t-resume   { background: #dbeafe; color: #1e40af; }
    .t-ehs      { background: #d1fae5; color: #065f46; }

    .q-text { font-size: 21px; font-weight: 600; line-height: 1.55; flex: 1; margin-bottom: 28px; }

    .reveal-area {
      text-align: center; padding-top: 20px; border-top: 1px solid var(--border);
      color: var(--muted); font-size: 14px; cursor: pointer;
      transition: color 0.15s;
    }
    .reveal-area:hover { color: var(--secondary); }

    /* ANSWER */
    .answer { border-top: 1px solid var(--border); padding-top: 24px; margin-top: 4px; }
    .a-block { margin-bottom: 16px; }
    .a-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #2563eb; margin-bottom: 6px; }
    .a-text { font-size: 14px; color: #374151; line-height: 1.7; }
    .a-terms { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .a-term { background: #f1f5f9; color: #1e40af; padding: 3px 10px; border-radius: 6px; font-size: 12px; font-family: monospace; }
    .follow-up { background: #fffbeb; border-left: 3px solid #f59e0b; padding: 12px 16px; border-radius: 0 8px 8px 0; margin-top: 16px; }
    .fu-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #92400e; margin-bottom: 4px; }
    .fu-text { font-size: 13px; color: #78350f; line-height: 1.5; }
    .fu-link { display: inline-block; margin-top: 8px; font-size: 12px; font-weight: 600; color: #2563eb; cursor: pointer; text-decoration: underline; }
    .fu-link:hover { color: #1d4ed8; }

    /* SCORE BUTTONS */
    .score-btns { display: flex; gap: 10px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
    .sbtn { flex: 1; padding: 12px; border-radius: 10px; border: 2px solid; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; background: white; }
    .sbtn-n { border-color: #16a34a; color: #16a34a; }
    .sbtn-n:hover { background: #16a34a; color: white; }
    .sbtn-o { border-color: #2563eb; color: #2563eb; }
    .sbtn-o:hover { background: #2563eb; color: white; }
    .sbtn-w { border-color: #dc2626; color: #dc2626; }
    .sbtn-w:hover { background: #dc2626; color: white; }

    /* NAVIGATION */
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 8px 28px 36px; max-width: 860px; margin: 0 auto; }
    .nav-btn { padding: 11px 24px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); font-size: 14px; font-weight: 500; cursor: pointer; color: var(--text); transition: all 0.15s; }
    .nav-btn:hover:not(:disabled) { background: #f5f0e8; }
    .nav-btn.primary { background: var(--active-bg); color: white; border-color: var(--active-bg); }
    .nav-btn.primary:hover:not(:disabled) { background: #334155; }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .nav-pos { font-size: 14px; color: var(--secondary); font-weight: 500; }

    /* EMPTY STATE */
    .empty { text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty-icon { font-size: 36px; margin-bottom: 12px; }
    .empty-text { font-size: 15px; }

    /* LIST VIEW */
    .list-view { padding: 0 28px 48px; max-width: 860px; margin: 0 auto; }
    .list-count { font-size: 13px; color: var(--secondary); margin-bottom: 14px; font-weight: 500; }
    .li { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
    .li-head { padding: 16px 20px; cursor: pointer; display: flex; align-items: flex-start; gap: 12px; }
    .li-head:hover { background: #faf9f7; }
    .li-num { font-size: 12px; color: var(--muted); min-width: 26px; font-weight: 700; padding-top: 2px; }
    .li-body { flex: 1; }
    .li-q { font-size: 14px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
    .li-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .li-chev { color: var(--muted); font-size: 11px; padding-top: 2px; transition: transform 0.2s; }
    .li.open .li-chev { transform: rotate(90deg); }
    .li-ans { display: none; padding: 0 20px 20px 58px; }
    .li.open .li-ans { display: block; border-top: 1px solid var(--border); padding-top: 16px; }

    .hidden { display: none !important; }
  </style>
</head>

const Q = [

    id: 1, cat: 'about', level: 'basic', resume: false,
    q: 'Tell me about yourself.',
    answer: [
      { t: 'text', l: '🎙 Say this (part 1 — background)', v: "\"I'm Parth. I've been building .NET backend systems for about 11 years. I started out building MVC applications for clients, then moved through progressively more complex systems — VMS platforms, contingent workforce tools, and for the last few years I've been on the Billing platform at Duck Creek Technologies, which is insurance SaaS used by global carriers. In that role I own production issues end-to-end — root cause, fix, regression, release. I've resolved Sev-1 deadlocks that were impacting carriers directly, led an observability overhaul across 9 Windows Services that previously had zero monitoring coverage, and redesigned API endpoints to eliminate 100K-row session pulls.\"" },
      { t: 'text', l: '🎙 Say this (part 2 — why you\'re here)', v: "\"What's brought me here is that my current role has become almost entirely reactive — bug fixes and production support on legacy code. I want to move into design ownership. So I've been building an EHS Safety platform from scratch on the side — Clean Architecture, CQRS, multi-tenancy in .NET 8 — specifically to close that gap. I'm looking for a senior remote role where I own a domain end-to-end, not just implement tickets someone else designed.\"" },
      { t: 'text', l: 'Coaching note', v: "Keep it to 60–90 seconds. Hit: years of experience → companies and what they were → concrete wins → why you're here. Don't recite your CV chronologically. Two sentences on past, two sentences on why you're in this room." },
      { t: 'fu', v: 'What are you looking for in your next role specifically?', fuLink: 2 }
    ]
  },
  {
    id: 2, cat: 'about', level: 'basic', resume: false,
    q: 'Why are you looking for a new opportunity?',
    answer: [
      { t: 'text', l: '🎙 Say this (the honest answer)', v: "\"Honestly — my current role has become almost entirely reactive. Production defects, supporting existing features, bug fixes on code written years before I joined. I've grown in specific areas — I know how to diagnose complex SQL Server issues, instrument .NET services, own production incidents. But I'm not getting any architecture involvement. Every design decision is made before I see the ticket. I want a role where I'm contributing to how systems are built, not just maintaining what already exists.\"" },
      { t: 'text', l: '🎙 Say this (what you\'re moving toward)', v: "\"What I'm looking for is a senior role on a modern .NET stack where I own a domain end-to-end — design decisions, implementation, production operations. A team with real engineering standards I can learn from, not just a backlog to execute. And remote is non-negotiable for me at this point — I've been fully remote for over a year and I work better that way.\"" },
      { t: 'text', l: 'Coaching note', v: "Don't trash your current company. The framing is 'I've grown what I can grow here, and I want the next level of challenge' — not 'my company is bad.' Be specific about what you want next. Vague answers ('I want growth') are red flags." },
      { t: 'fu', v: 'What does a good role look like to you day-to-day?', fuLink: 27 }
    ]
  },
  {
    id: 3, cat: 'about', level: 'basic', resume: false,
    q: 'Where do you see yourself in 3–5 years?',
    answer: [
      { t: 'text', l: '🎙 Say this (the goal)', v: "\"I'm targeting Principal Engineer or Architect level — someone who designs systems, makes technology decisions, sets technical direction. Not management — I want to stay technical. The way I think about it: there's a difference between being handed tickets and being the person who figures out what the tickets should be. I want to be that second person.\"" },
      { t: 'text', l: '🎙 Say this (how you\'re getting there)', v: "\"The gap I'm actively closing is that I've never owned a SaaS system from scratch — the full scope: architecture decisions, multi-tenancy model, cloud deployment, auth, background jobs. So I'm building a Health and Safety platform on the side specifically for that reason. My goal is that in 3 years I can point to a real production system I designed and operated end-to-end, not just 14 years of executing other people's designs.\"" },
      { t: 'text', l: 'Coaching note', v: "This question is checking ambition + self-awareness. Show you have a clear direction AND that you know the gap. The side project is your evidence — mention it. Don't say 'in a management role' unless you mean it." },
      { t: 'fu', v: 'What is the biggest skill or experience gap you are actively closing right now?', fuLink: 28 }
    ]
  },
  {
    id: 4, cat: 'behaviour', level: 'medium', resume: true, resumeRef: 'R01',
    q: 'Tell me about a time you took ownership beyond what was assigned to you.',
    answer: [
      { t: 'text', l: 'Situation', v: "At Duck Creek I was looking at health check failures across the Billing service fleet — 9 Windows Services running background batch jobs. I expected maybe 1 or 2 gaps. It was 7 out of 9 with zero monitoring coverage — no health checks, no metrics, no visibility into whether they were running correctly." },
      { t: 'text', l: 'Action', v: "Nobody asked me to fix it. I put together a plan, got informal sign-off from the team lead, and led the instrumentation effort — health checks on all 9 services, batch metrics migrated to .NET 8 OpenTelemetry, Grafana dashboards verified. I also wrote a 1,500-line architectural observability guide documenting the pattern, the decisions, and how to extend it for new services." },
      { t: 'text', l: 'Result', v: "The guide was adopted by the team as the standard. The org went from zero visibility to full coverage across every background service. I became the go-to person for observability questions on the team." },
      { t: 'terms', l: 'Key Terms', v: ['OpenTelemetry', 'IHealthCheck', 'Grafana', '.NET 8 metrics API', 'Windows Services'] },
      { t: 'fu', v: 'How did you get buy-in to spend time on this when it wasn\'t assigned work?', fuLink: 29 }
    ]
  },
  {
    id: 5, cat: 'behaviour', level: 'medium', resume: true, resumeRef: 'R02',
    q: 'Tell me about a production issue you resolved under pressure.',
    answer: [
      { t: 'text', l: 'Situation', v: "Duck Creek Billing — a high-traffic stored procedure handling receivable posting started causing carrier-reported blocking. Insurance carriers reporting it, production impacted, needed a fix fast." },
      { t: 'text', l: 'Action', v: "Root-cause analysis using SQL Server deadlock graphs and blocking chain traces. Found the SP was holding row locks for too long during intermediate calculations — it was reading, computing, and writing back in a way that caused circular lock dependencies under concurrent load. Refactored to use temp tables to stage intermediate results, then restructured the lock acquisition order to eliminate the circular dependency." },
      { t: 'text', l: 'Result', v: "Eliminated the blocking entirely. The fix was paired with regression tests covering the receivable posting path and shipped in the next monthly release." },
      { t: 'terms', l: 'Key Terms', v: ['deadlock graph', 'blocking chain', 'lock acquisition order', 'temp tables', 'SQL Server trace'] },
      { t: 'fu', v: 'How do you distinguish a deadlock from a blocking scenario — and does the fix differ?', fuLink: 15 }

  },
  {

    answer: [
      { t: 'text', l: 'Situation', v: "At Magnit Global we needed to integrate 5 third-party HR APIs — Eightfold, DEI Candidate, Brainville, ICIMS, Engage. Each had different auth, different request shapes, different error formats. Every integration was being built ad-hoc with no shared structure and no audit trail." },
      { t: 'text', l: 'Action', v: "Built a reusable API integration framework — a shared HttpClient abstraction using DelegatingHandler, standardised error handling, and a logging layer that captured every outbound request and inbound response automatically. Every integration used the same wrapper — no per-integration boilerplate, full audit trail by default." },
      { t: 'text', l: 'Result', v: "5 integrations built using the same pattern. Full audit trail on all external API traffic. New integrations could be onboarded by following the pattern — no copy-paste logging code." },
      { t: 'terms', l: 'Key Terms', v: ['DelegatingHandler', 'HttpClient', 'Adapter pattern', 'audit logging', 'IHttpClientFactory'] },
      { t: 'fu', v: 'How did you handle authentication differences between the 5 APIs — did the framework abstract that too?', fuLink: 30 }

  },
  {
    id: 7, cat: 'dotnet', level: 'basic', resume: false,
    q: 'What is the difference between .NET Framework and .NET 8?',
    answer: [
      { t: 'text', l: 'Core Difference', v: ".NET Framework is Windows-only, ships with the OS, ended at version 4.8 — no new features. .NET Core / .NET 5+ (now just called .NET) is cross-platform (Windows, Linux, macOS), open source, ships independently of the OS, and gets new features every November. .NET 8 is the current LTS release (3-year support window)." },
      { t: 'text', l: 'Why it matters', v: "For any new system: .NET 8. It's faster, has better tooling, Minimal API support, better async performance, and gets ongoing investment. .NET Framework is maintenance mode — you only stay on it if you have a legacy constraint, like WCF-heavy systems or old COM dependencies." },
      { t: 'text', l: 'Where I stand', v: "My day job runs .NET Framework (company constraint). Every new system I build — including the EHS platform — is .NET 8." },
      { t: 'fu', v: 'What specific .NET 8 features have you used that weren\'t available in Framework?', fuLink: 31 }
    ]
  },
  {
    id: 8, cat: 'dotnet', level: 'basic', resume: false,
    q: 'Explain dependency injection and why it matters in .NET.',
    answer: [
      { t: 'text', l: 'What it is', v: "DI is a design pattern where a class declares what it needs (its dependencies via constructor parameters) and the DI container provides them. You register services in Program.cs and the runtime injects them wherever they're requested." },
      { t: 'text', l: 'The three lifetimes', v: "Transient — new instance every injection. Scoped — one instance per HTTP request (most common for services). Singleton — one instance for the application lifetime (caches, config readers)." },
      { t: 'text', l: 'Why it matters', v: "Decoupling: your class depends on an interface (IMyService), not a concrete type. Testability: inject a mock in tests. Lifetime management: the container manages object creation and disposal — you don't." },
      { t: 'terms', l: 'Key Terms', v: ['IServiceCollection', 'AddScoped', 'AddTransient', 'AddSingleton', 'constructor injection'] },
      { t: 'fu', v: 'What is a captive dependency and why is it dangerous?', fuLink: 32 }
    ]
  },
  {
    id: 9, cat: 'dotnet', level: 'medium', resume: false,
    q: 'What is async/await and how does it work under the hood in C#?',
    answer: [
      { t: 'text', l: 'What it is', v: "async/await is syntactic sugar over the Task Parallel Library (TPL). When you mark a method async and await a Task, you're telling the compiler to rewrite that method as a state machine." },
      { t: 'text', l: 'How it works', v: "The method runs synchronously until the first await that isn't already complete. At that point it returns a Task to the caller — the thread is released back to the pool. When the awaited operation completes, the runtime picks up a thread (from the thread pool, or the original sync context in UI apps) and resumes the state machine from where it paused." },
      { t: 'text', l: 'Key point', v: "async/await does NOT create new threads. It releases threads during I/O waits. This is what allows a web server to handle thousands of concurrent requests with a small thread pool — threads aren't blocked waiting for database queries." },
      { t: 'terms', l: 'Key Terms', v: ['state machine', 'Task', 'thread pool', 'SynchronizationContext', 'ConfigureAwait'] },
      { t: 'fu', v: 'What does ConfigureAwait(false) do and when should you use it?', fuLink: 33 }

  {
    id: 10, cat: 'dotnet', level: 'medium', resume: false,
    q: 'What is the difference between IEnumerable, IQueryable, and ICollection?',
    answer: [
      { t: 'text', l: 'IEnumerable<T>', v: "Forward-only in-memory iteration. Once data is loaded into memory, LINQ operations (Where, Select) execute in-process on that data. Lowest abstraction." },
      { t: 'text', l: 'IQueryable<T>', v: "Builds an expression tree that the provider translates (EF Core → SQL). The WHERE clause happens at the database, not in your app. Critical: if you return IQueryable from a repo method, callers can compose queries and the SQL is built up lazily. If you ToList() too early, you pull everything into memory first." },
      { t: 'text', l: 'ICollection<T>', v: "Extends IEnumerable with Count, Add, Remove, Contains. Use for in-memory collections you need to modify or count without enumerating." },

  {

    answer: [

    q: 'What does ConfigureAwait(false) do and when should you actually use it?',
    answer: [
      { t: 'text', l: 'What it does', v: "By default, awaiting a Task tries to resume on the original SynchronizationContext (the thread/context that started the operation). ConfigureAwait(false) says: I don't need the original context — resume on any available thread pool thread." },
      { t: 'text', l: 'Where it matters', v: "In UI apps (WinForms, WPF) and classic ASP.NET: there is a SynchronizationContext that requires certain code to run on the UI thread or request thread. If library code awaits without ConfigureAwait(false), it captures this context. If the caller then blocks with .Result or .Wait(), you get a deadlock — the context is blocked waiting for the task, and the task is waiting for the context to free up." },
      { t: 'text', l: 'In ASP.NET Core specifically', v: "ASP.NET Core has no SynchronizationContext — the default is null. So ConfigureAwait(false) technically has no effect there. But in library code that might be called from UI apps too, always use it. In ASP.NET Core application code, it's optional — many teams still use it as a signal that 'this code doesn't need the UI context.'" },

    q: 'When would you add a covering index rather than modifying the clustered index?',
    answer: [
      { t: 'text', l: 'Why you almost never change the clustered index on a live table', v: "The clustered index IS the physical row order. Rebuilding it on a table with millions of rows means SQL Server rewrites the entire table — massive I/O, potential hours of downtime or blocking. You set the clustered index during schema design, not as a production performance fix." },
      { t: 'text', l: 'When a covering index is the right tool', v: "A key lookup in the execution plan means SQL Server found the row via a non-clustered index but then had to fetch additional columns from the clustered index. Adding the missing columns via INCLUDE on the non-clustered index eliminates that second trip — creating a covering index for that specific query at minimal cost." },
      { t: 'text', l: 'The trade-off', v: "Every index increases write cost — INSERT/UPDATE/DELETE must maintain all indexes. A wide covering index with many INCLUDE columns is fast for reads but expensive for write-heavy tables. Always measure logical reads before and after. Verify the read benefit justifies the write overhead." },

    q: 'What is parameter sniffing in SQL Server — how do you diagnose and fix it?',
    answer: [
      { t: 'text', l: 'What it is', v: "When SQL Server first compiles a stored procedure or parameterised query, it peeks at the current parameter values and builds an execution plan optimised for those specific values. That plan is cached. If the next execution has very different parameters (small customer plan cached, now running for a large one), the cached plan may be badly wrong — wrong index choices, wrong join strategy." },
      { t: 'text', l: 'How to detect it', v: "Query runs fast interactively but slow via stored proc. Execution plan shows estimates wildly diverging from actuals. sys.dm_exec_cached_plans + sys.dm_exec_sql_text can reveal the cached plan and its compile-time parameters." },
      { t: 'text', l: 'Fixes and trade-offs', v: "OPTION (RECOMPILE): Forces recompile every execution — correct plan always, but compilation overhead on every call. Bad for high-frequency procs. OPTIMIZE FOR UNKNOWN: Uses average column statistics — more stable across different inputs, occasionally suboptimal. Local variable assignment inside the SP hides the value from the optimizer and forces stats-based estimates. OPTION (OPTIMIZE FOR (@val UNKNOWN)): Per-parameter control." },
      { t: 'terms', l: 'Key Terms', v: ['plan cache', 'OPTION RECOMPILE', 'OPTIMIZE FOR UNKNOWN', 'sys.dm_exec_cached_plans', 'execution plan stability'] },

    answer: [
      { t: 'text', l: 'The critical distinction', v: "DbUpdateConcurrencyException means the row changed since you last read it. Retrying with the same stale data will produce the same exception — or worse, silently overwrite someone else's changes. A blind retry is always wrong." },

    id: 51, cat: 'system', level: 'advanced', resume: false, tag: 'EHS',
    q: 'You have a SQL Server database already storing incident data. A product manager asks for a "smart search" — users type anything and get the most relevant results. How do you approach this, and why might SQL Server full-text search not be enough?',
    answer: [
      { t: 'text', l: 'The core problem', v: "SQL Server is built for structured queries: give me rows where status = Open and tenantId = X. It has a Full-Text Search feature for keyword matching, but it returns rows that match — not rows ranked by how well they match. A user searching 'chemical fumes near storage' gets back every row containing those words with no indication of which is most relevant." },
      { t: 'text', l: 'What SQL Full-Text Search requires', v: "Before you can run a single CONTAINS query, SQL Server needs a Full-Text Catalog created, a Full-Text Index built on the target table, and a background population job to complete. On a large table this takes minutes to hours. Adding a new searchable column means rebuilding the index. It is not zero-setup — it is a pipeline you must maintain." },
      { t: 'text', l: 'What Elasticsearch adds', v: "Elasticsearch is built specifically for full-text search. Every text field is indexed with an inverted index automatically — no catalog, no population job. Crucially, it returns a relevance score per result. A document mentioning 'chemical' in the title and 'fumes' in the description scores higher than one mentioning only 'fumes' in the body. Users get the most relevant result first, not just a matching result." },
      { t: 'text', l: 'In practice on EHS Platform', v: "We ran this comparison as a spike (EHS-52). Created an ehs-incidents index in Kibana Dev Tools, inserted 5 EHS-shaped documents, ran a multi_match query for 'chemical fumes' across title and description. Two documents returned, correctly ranked: ChemicalSpill scored 2.30 (match in title + description), HazardousCondition scored 0.83 (match in description only). The SQL equivalent failed immediately with Msg 7601 — Full-Text Catalog not configured. ES was querying live data in under 5 minutes with zero infrastructure setup." },
      { t: 'text', l: 'The dual-write tradeoff', v: "Elasticsearch is a secondary store — SQL Server stays the source of truth. You must write to both: SQL Server for ACID correctness, Elasticsearch for search. The pattern for reliable dual-write is the Outbox Pattern: save the business event to an OutboxMessages table in the same SQL transaction, then a background worker reads it and indexes into ES. If ES is down, the message waits — nothing is lost." },

      { t: 'text', l: 'The three isolation options', v: "Multi-tenancy has three isolation levels: DB-per-tenant (each tenant gets their own database — strongest isolation, highest operational cost, n × migrations), schema-per-tenant (shared DB, separate schema per tenant — medium complexity, EF support is limited), row-level isolation (shared tables, TenantId column on every row — lowest cost, single migration path, scales to hundreds of tenants without operational overhead). Row-level is correct at early and mid scale. DB-per-tenant is justified only when regulatory requirements or extreme data sensitivity demand physical separation." },

      { t: 'text', l: 'The problem with naive dual-write', v: "The naive approach: write entity to SQL Server, then POST document to Elasticsearch. If the app crashes after the SQL commit but before the ES write, SQL has the record but ES does not. These two stores are now permanently out of sync. There is no retry — the in-memory state of the failed request is gone." },
      { t: 'text', l: 'How the Outbox Pattern solves it', v: "Instead of writing to ES directly, write an OutboxMessage row to a SQL table in the same transaction as the entity change. Both the entity INSERT and the OutboxMessage INSERT commit atomically — or neither does. A background worker (hosted service or job) polls the Outbox table, reads unprocessed rows, writes to Elasticsearch, and marks each row as processed only after a confirmed ES write." },
      { t: 'text', l: 'What happens on crash', v: "If the app crashes after the SQL commit: the OutboxMessage row survived the crash because it was committed. On restart, the background worker finds the unprocessed row and retries. If the worker crashes after the ES write but before marking the row processed: the row gets retried and ES is written again. This is at-least-once delivery — the ES write may happen more than once, but never zero times." },

    q: 'Your .NET 8 API stores all timestamps as DateTime with Kind = Utc. A colleague argues this is equivalent to DateTimeOffset since you always call DateTime.UtcNow. What is the flaw in that reasoning, and what specifically breaks at the SQL Server boundary?',
    answer: [
      { t: 'text', l: 'DateTime.Kind is in-process metadata, not structure', v: "Kind = Utc is a 2-bit flag on the .NET object. It does not survive serialization, database round-trips, or process boundaries. The value 2026-05-31T14:23:00 has the same byte representation whether Kind is Utc, Local, or Unspecified — the flag is discarded when writing to a database column. Your discipline of always calling DateTime.UtcNow is not enforced by the type system; it is a convention that any developer can violate without a compiler error." },
      { t: 'text', l: 'What breaks at the SQL Server boundary', v: "DateTime maps to datetime2(7) — stores raw ticks, no offset. EF Core writes 2026-05-31T14:23:00 and the Kind flag is gone. When EF Core reads it back, it returns DateTime with Kind = Unspecified (not Utc). DateTimeOffset maps to datetimeoffset(7) — stores the value plus the UTC offset (+00:00) in the column. SQL Server preserves the offset. EF Core reads it back as DateTimeOffset with Offset = +00:00. No flag, no convention — the correctness is in the column type." },
      { t: 'text', l: 'What silently breaks in practice', v: "An app server in US-East and one in EU-West both read the same datetime2 column. If either calls .ToLocalTime() on the DateTime returned by EF (Kind = Unspecified), they interpret it as their own local timezone — audit log timestamps become wrong with no error thrown. JSON serialization of DateTime(Kind=Unspecified) via System.Text.Json omits the Z suffix — API consumers cannot tell if the value is UTC or local. DateTimeOffset always serializes with the offset: 2026-05-31T14:23:00+00:00." },
      { t: 'text', l: 'The migration cost — do it before production data', v: "Changing DateTime to DateTimeOffset on an existing schema requires an EF Core migration that drops and recreates all affected columns (datetime2 to datetimeoffset). EF Core flags this as a potential data-loss migration. In the EHS platform this touched BaseEntity.CreatedAt and UpdatedAt (inherited by every entity), plus OccurredAt, DueDate, CompletedAt, ChangedAt, and LastLoginAt — one migration (EHS62_DateTimeOffset) covered all of them. Do this sweep before any production tenant data exists; retrofitting it later requires a multi-step online migration." },
      { t: 'text', l: 'The one correct exception — JWT expiry', v: "SecurityTokenDescriptor.Expires is DateTime? — a .NET JWT library requirement. This is a library boundary: you pass DateTime.UtcNow.AddMinutes(n) here and nowhere else. Document it as an explicit exception (ADR-016 in this project) so future developers do not mistake it for an oversight." },

  const idx = Q.findIndex(q => q.id === id);
  if (idx !== -1) { state.idx = idx; state.revealed = false; state.view = 'card'; render(); }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── RENDER HELPERS ──────────────────────────────────────────────────────────

const CAT_META = {
  about:     { label: 'About You',       cls: 't-about' },
  dotnet:    { label: '.NET & C#',       cls: 't-dotnet' },
  sql:       { label: 'SQL & Databases', cls: 't-sql' },
  system:    { label: 'System Design',   cls: 't-system' },
  behaviour: { label: 'Behavioural',     cls: 't-behaviour' },
  remote:    { label: 'Remote Work',     cls: 't-remote' }
};

function tagHtml(cls, label) {
  return `<span class="tag ${cls}">${label}</span>`;
}

function answerHtml(sections) {
  return sections.map(s => {
    if (s.t === 'text') return `<div class="a-block"><div class="a-lbl">${s.l}</div><div class="a-text">${s.v}</div></div>`;
    if (s.t === 'terms') return `<div class="a-block"><div class="a-lbl">${s.l}</div><div class="a-terms">${s.v.map(t => `<span class="a-term">${t}</span>`).join('')}</div></div>`;
    if (s.t === 'fu') {
      const link = s.fuLink ? `<span class="fu-link" onclick="goToQuestion(${s.fuLink})">Jump to that question →</span>` : '';
      return `<div class="follow-up"><div class="fu-lbl">Follow-up they will ask</div><div class="fu-text">${s.v}</div>${link}</div>`;
    }
    return '';
  }).join('');
}

// ─── CARD VIEW ───────────────────────────────────────────────────────────────

function render() {
  const list = filtered();
  const cardView = document.getElementById('cardView');
  const navBar = document.getElementById('navBar');
  const listView = document.getElementById('listView');

  document.getElementById('sNailed').textContent = state.scores.nailed;
  document.getElementById('sOkay').textContent   = state.scores.okay;
  document.getElementById('sWork').textContent   = state.scores.work;

  if (state.view === 'list') {
    cardView.classList.add('hidden');
    navBar.classList.add('hidden');
    listView.classList.remove('hidden');
    renderList(list);
    document.getElementById('counter').textContent = `${list.length} question${list.length !== 1 ? 's' : ''}`;
    return;
  }

  cardView.classList.remove('hidden');
  listView.classList.add('hidden');

  if (list.length === 0) {
    navBar.classList.add('hidden');
    document.getElementById('qCard').innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No questions match this filter</div></div>`;
    document.getElementById('counter').textContent = 'No cards';
    return;
  }

  navBar.classList.remove('hidden');
  if (state.idx >= list.length) state.idx = 0;

  const q = list[state.idx];
  const cat = CAT_META[q.cat];
  const levelCls = `t-${q.level}`;
  const levelLabel = q.level.charAt(0).toUpperCase() + q.level.slice(1);

  let tags = tagHtml(cat.cls, cat.label) + tagHtml(levelCls, levelLabel);
  if (q.resume) tags += tagHtml('t-resume', '📋 Resume-linked');
  if (q.tag) tags += tagHtml('t-ehs', '🏗 EHS');

  let cardHtml = `
    <div class="q-label">Question</div>
    <div class="q-tags">${tags}</div>
    <div class="q-text">${q.q}</div>
  `;

  if (!state.revealed) {
    cardHtml += `<div class="reveal-area" onclick="reveal()">Tap to reveal answer</div>`;
  } else {
    cardHtml += `
      <div class="answer">${answerHtml(q.answer)}</div>
      <div class="score-btns">
        <button class="sbtn sbtn-n" onclick="score('nailed')">✓ Nailed it</button>
        <button class="sbtn sbtn-o" onclick="score('okay')">~ Okay</button>
        <button class="sbtn sbtn-w" onclick="score('work')">✗ Need work</button>
      </div>
    `;
  }

  document.getElementById('qCard').innerHTML = cardHtml;

  const pos = state.idx + 1;
  const total = list.length;
  document.getElementById('counter').textContent = `Card ${pos} of ${total}`;
  document.getElementById('navPos').textContent = `${pos} / ${total}`;
  document.getElementById('btnPrev').disabled = state.idx === 0;
  document.getElementById('btnNext').disabled = state.idx === list.length - 1;
}

function reveal() {
  state.revealed = true;
  render();
}

function score(type) {
  state.scores[type]++;
  go(1);
}

function go(dir) {
  const list = filtered();
  const next = state.idx + dir;
  if (next >= 0 && next < list.length) {
    state.idx = next;
    state.revealed = false;
    render();
  }
}

// ─── LIST VIEW ───────────────────────────────────────────────────────────────

function renderList(list) {
  document.getElementById('listCount').textContent = `${list.length} question${list.length !== 1 ? 's' : ''}`;
  document.getElementById('listItems').innerHTML = list.map((q, i) => {
    const cat = CAT_META[q.cat];
    const levelLabel = q.level.charAt(0).toUpperCase() + q.level.slice(1);
    return `
      <div class="li" id="li-${q.id}">
        <div class="li-head" onclick="toggleListItem(${q.id})">
          <div class="li-num">${String(i + 1).padStart(2, '0')}</div>
          <div class="li-body">
            <div class="li-q">${q.q}</div>
            <div class="li-tags">
              ${tagHtml(cat.cls, cat.label)}
              ${tagHtml(`t-${q.level}`, levelLabel)}
              ${q.resume ? tagHtml('t-resume', '📋 Resume-linked') : ''}
              ${q.tag ? tagHtml('t-ehs', '🏗 EHS') : ''}
            </div>
          </div>
          <div class="li-chev">▶</div>
        </div>
        <div class="li-ans">${answerHtml(q.answer)}</div>
      </div>
    `;
  }).join('');
}

function toggleListItem(id) {
  const el = document.getElementById(`li-${id}`);
  el.classList.toggle('open');
}

// ─── VIEW TOGGLE ─────────────────────────────────────────────────────────────

function toggleView() {
  state.view = state.view === 'card' ? 'list' : 'card';
  const btn = document.getElementById('viewToggle');
  btn.textContent = state.view === 'card' ? 'List View' : 'Card View';
  btn.classList.toggle('active', state.view === 'list');
  render();
}

// ─── INIT ────────────────────────────────────────────────────────────────────

render();
</script>
</body>
</html>
