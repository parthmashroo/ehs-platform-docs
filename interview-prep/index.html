<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview Prep — Parth Mashroo</title>
  <style>
    :root {
      --bg: #f0ebe2;
      --card: #ffffff;
      --border: #e2ddd6;
      --text: #1a1a2e;
      --muted: #94a3b8;
      --secondary: #64748b;
      --active-bg: #1e293b;
      --active-text: #ffffff;
      --radius: 12px;
      --radius-lg: 20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .wrap { max-width: 860px; margin: 0 auto; padding: 0 28px; }

    /* HEADER */
    .header { display: flex; align-items: center; justify-content: space-between; padding: 28px 28px 0; max-width: 860px; margin: 0 auto; }
    .header-title { font-size: 22px; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .card-counter { font-size: 14px; color: var(--secondary); font-weight: 500; }
    .view-btn { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text); transition: all 0.15s; }
    .view-btn:hover { background: #f5f0e8; }
    .view-btn.active { background: var(--active-bg); color: var(--active-text); border-color: var(--active-bg); }

    /* SCORES */
    .scores { display: flex; gap: 12px; padding: 20px 28px; max-width: 860px; margin: 0 auto; }
    .score-box { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 12px; text-align: center; }
    .score-num { font-size: 30px; font-weight: 700; line-height: 1; }
    .score-num.g { color: #16a34a; }
    .score-num.b { color: #2563eb; }
    .score-num.r { color: #dc2626; }
    .score-lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* FILTERS */
    .filters { padding: 0 28px 16px; max-width: 860px; margin: 0 auto; }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .fbtn {
      padding: 7px 16px; border-radius: 999px; border: 1px solid var(--border);
      background: var(--card); font-size: 13px; font-weight: 500; cursor: pointer;
      color: var(--text); transition: all 0.15s; white-space: nowrap;
    }
    .fbtn:hover { border-color: #94a3b8; }
    .fbtn.on { background: var(--active-bg); color: white; border-color: var(--active-bg); }
    .fbtn.l-basic.on { background: #16a34a; border-color: #16a34a; }
    .fbtn.l-medium.on { background: #d97706; border-color: #d97706; }
    .fbtn.l-advanced.on { background: #dc2626; border-color: #dc2626; }

    /* CARD VIEW */
    .card-view { padding: 0 28px 16px; max-width: 860px; margin: 0 auto; }
    .q-card {
      background: var(--card); border-radius: var(--radius-lg);
      box-shadow: 0 4px 24px rgba(0,0,0,0.10); padding: 40px;
      min-height: 280px; display: flex; flex-direction: column;
    }
    .q-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 14px; }
    .q-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .tag { padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .t-about    { background: #ede9fe; color: #6d28d9; }
    .t-dotnet   { background: #f3e8ff; color: #7c3aed; }
    .t-sql      { background: #ccfbf1; color: #0f766e; }
    .t-system   { background: #fef3c7; color: #92400e; }
    .t-behaviour{ background: #ffe4e6; color: #be123c; }
    .t-remote   { background: #e0f2fe; color: #0369a1; }
    .t-basic    { background: #dcfce7; color: #166534; }
    .t-medium   { background: #fef9c3; color: #854d0e; }
    .t-advanced { background: #fee2e2; color: #991b1b; }
    .t-resume   { background: #dbeafe; color: #1e40af; }
    .t-ehs      { background: #d1fae5; color: #065f46; }

    .q-text { font-size: 21px; font-weight: 600; line-height: 1.55; flex: 1; margin-bottom: 28px; }

    .reveal-area {
      text-align: center; padding-top: 20px; border-top: 1px solid var(--border);
      color: var(--muted); font-size: 14px; cursor: pointer;
      transition: color 0.15s;
    }
    .reveal-area:hover { color: var(--secondary); }

    /* ANSWER */
    .answer { border-top: 1px solid var(--border); padding-top: 24px; margin-top: 4px; }
    .a-block { margin-bottom: 16px; }
    .a-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #2563eb; margin-bottom: 6px; }
    .a-text { font-size: 14px; color: #374151; line-height: 1.7; }
    .a-terms { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .a-term { background: #f1f5f9; color: #1e40af; padding: 3px 10px; border-radius: 6px; font-size: 12px; font-family: monospace; }
    .follow-up { background: #fffbeb; border-left: 3px solid #f59e0b; padding: 12px 16px; border-radius: 0 8px 8px 0; margin-top: 16px; }
    .fu-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #92400e; margin-bottom: 4px; }
    .fu-text { font-size: 13px; color: #78350f; line-height: 1.5; }

    /* SCORE BUTTONS */
    .score-btns { display: flex; gap: 10px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
    .sbtn { flex: 1; padding: 12px; border-radius: 10px; border: 2px solid; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; background: white; }
    .sbtn-n { border-color: #16a34a; color: #16a34a; }
    .sbtn-n:hover { background: #16a34a; color: white; }
    .sbtn-o { border-color: #2563eb; color: #2563eb; }
    .sbtn-o:hover { background: #2563eb; color: white; }
    .sbtn-w { border-color: #dc2626; color: #dc2626; }
    .sbtn-w:hover { background: #dc2626; color: white; }

    /* NAVIGATION */
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 8px 28px 36px; max-width: 860px; margin: 0 auto; }
    .nav-btn { padding: 11px 24px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); font-size: 14px; font-weight: 500; cursor: pointer; color: var(--text); transition: all 0.15s; }
    .nav-btn:hover:not(:disabled) { background: #f5f0e8; }
    .nav-btn.primary { background: var(--active-bg); color: white; border-color: var(--active-bg); }
    .nav-btn.primary:hover:not(:disabled) { background: #334155; }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .nav-pos { font-size: 14px; color: var(--secondary); font-weight: 500; }

    /* EMPTY STATE */
    .empty { text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty-icon { font-size: 36px; margin-bottom: 12px; }
    .empty-text { font-size: 15px; }

    /* LIST VIEW */
    .list-view { padding: 0 28px 48px; max-width: 860px; margin: 0 auto; }
    .list-count { font-size: 13px; color: var(--secondary); margin-bottom: 14px; font-weight: 500; }
    .li { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
    .li-head { padding: 16px 20px; cursor: pointer; display: flex; align-items: flex-start; gap: 12px; }
    .li-head:hover { background: #faf9f7; }
    .li-num { font-size: 12px; color: var(--muted); min-width: 26px; font-weight: 700; padding-top: 2px; }
    .li-body { flex: 1; }
    .li-q { font-size: 14px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
    .li-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .li-chev { color: var(--muted); font-size: 11px; padding-top: 2px; transition: transform 0.2s; }
    .li.open .li-chev { transform: rotate(90deg); }
    .li-ans { display: none; padding: 0 20px 20px 58px; }
    .li.open .li-ans { display: block; border-top: 1px solid var(--border); padding-top: 16px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-title">Interview Prep</div>
  <div class="header-right">
    <a href="ehs-deep.html" style="font-size:13px;font-weight:600;color:#065f46;background:#d1fae5;padding:7px 14px;border-radius:8px;text-decoration:none;border:1px solid #a7f3d0;">🏗 EHS Deep Dive</a>
    <span class="card-counter" id="counter">Card 1 of 26</span>
    <button class="view-btn" id="viewToggle" onclick="toggleView()">List View</button>
  </div>
</div>

<div class="scores">
  <div class="score-box"><div class="score-num g" id="sNailed">0</div><div class="score-lbl">Nailed it</div></div>
  <div class="score-box"><div class="score-num b" id="sOkay">0</div><div class="score-lbl">Okay</div></div>
  <div class="score-box"><div class="score-num r" id="sWork">0</div><div class="score-lbl">Need work</div></div>
</div>

<div class="filters">
  <div class="filter-row" id="catFilters">
    <button class="fbtn on" data-cat="all" onclick="setFilter('cat','all',this)">All</button>
    <button class="fbtn" data-cat="about" onclick="setFilter('cat','about',this)">About You</button>
    <button class="fbtn" data-cat="dotnet" onclick="setFilter('cat','dotnet',this)">.NET &amp; C#</button>
    <button class="fbtn" data-cat="sql" onclick="setFilter('cat','sql',this)">SQL &amp; Databases</button>
    <button class="fbtn" data-cat="system" onclick="setFilter('cat','system',this)">System Design</button>
    <button class="fbtn" data-cat="behaviour" onclick="setFilter('cat','behaviour',this)">Behavioural</button>
    <button class="fbtn" data-cat="remote" onclick="setFilter('cat','remote',this)">Remote Work</button>
  </div>
  <div class="filter-row" id="levelFilters">
    <button class="fbtn on" data-lvl="all" onclick="setFilter('lvl','all',this)">All Levels</button>
    <button class="fbtn l-basic" data-lvl="basic" onclick="setFilter('lvl','basic',this)">Basic</button>
    <button class="fbtn l-medium" data-lvl="medium" onclick="setFilter('lvl','medium',this)">Medium</button>
    <button class="fbtn l-advanced" data-lvl="advanced" onclick="setFilter('lvl','advanced',this)">Advanced</button>
  </div>
</div>

<div class="card-view" id="cardView">
  <div class="q-card" id="qCard"><!-- rendered by JS --></div>
</div>

<div class="nav hidden" id="navBar">
  <button class="nav-btn" id="btnPrev" onclick="go(-1)">← Prev</button>
  <span class="nav-pos" id="navPos">1 / 25</span>
  <button class="nav-btn primary" id="btnNext" onclick="go(1)">Next →</button>
</div>

<div class="list-view hidden" id="listView">
  <div class="list-count" id="listCount"></div>
  <div id="listItems"></div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

const Q = [
  {
    id: 1, cat: 'about', level: 'basic', resume: false,
    q: 'Tell me about yourself.',
    answer: [
      { t: 'text', l: 'The Pitch', v: "Senior Software Engineer, 11+ years in .NET. Started as a developer building MVC apps for clients, moved through increasing complexity — VMS platforms, contingent workforce systems, and now the Billing platform at Duck Creek Technologies, which is Insurance SaaS used by global carriers. At Duck Creek I own production issues end-to-end — root cause, fix, regression, release. I've resolved Sev-1 deadlocks, led the observability uplift across their Windows Service fleet, and redesigned API endpoints to eliminate 100K-row session pulls." },
      { t: 'text', l: 'Why I am here', v: "My current role is mostly execution — I want design ownership and architecture decisions. I'm building an EHS Safety platform on the side from scratch — Clean Architecture, CQRS, multi-tenancy in .NET 8 — specifically to bridge that gap. I'm looking for a senior remote role where I can own systems, not just implement tickets." },
      { t: 'fu', v: 'What are you looking for in your next role specifically?' }
    ]
  },
  {
    id: 2, cat: 'about', level: 'basic', resume: false,
    q: 'Why are you looking for a new opportunity?',
    answer: [
      { t: 'text', l: 'Honest Answer', v: "My current role is almost entirely reactive — production defects, supporting existing features, bug fixes on legacy code. I've grown in specific areas but I'm not getting design ownership or any architecture involvement. I want a role where I'm contributing to how systems are built, not just maintaining what already exists." },
      { t: 'text', l: 'What I want next', v: "A senior role on a modern .NET stack where I own a domain end-to-end — design, implementation, production. Ideally where the team has engineering standards I can learn from, not just tasks I execute. Remote is a requirement, not a preference." },
      { t: 'fu', v: 'What does a "good" role look like to you day-to-day?' }
    ]
  },
  {
    id: 3, cat: 'about', level: 'basic', resume: false,
    q: 'Where do you see yourself in 3–5 years?',
    answer: [
      { t: 'text', l: 'Target', v: "Principal Engineer or Architect level — someone who designs systems, makes technology decisions, and sets technical direction. Not people management — technical leadership. The difference between being handed tickets and being the person who figures out what the tickets should be." },
      { t: 'text', l: 'How I am closing the gap', v: "The EHS platform I'm building on the side is specifically for this. I've never designed a SaaS system from scratch — bounded contexts, multi-tenancy strategy, clean architecture, cloud deployment, auth, background jobs. I'm doing all of that deliberately so that in 3 years I have a real system to point to, not just 11 years of maintaining other people's systems." },
      { t: 'fu', v: 'What is the biggest gap between where you are now and that goal?' }
    ]
  },
  {
    id: 4, cat: 'behaviour', level: 'medium', resume: true, resumeRef: 'R01',
    q: 'Tell me about a time you took ownership beyond what was assigned to you.',
    answer: [
      { t: 'text', l: 'Situation', v: "At Duck Creek I was looking at health check failures across the Billing service fleet — 9 Windows Services running background batch jobs. I expected maybe 1 or 2 gaps. It was 7 out of 9 with zero monitoring coverage — no health checks, no metrics, no visibility into whether they were running correctly." },
      { t: 'text', l: 'Action', v: "Nobody asked me to fix it. I put together a plan, got informal sign-off from the team lead, and led the instrumentation effort — health checks on all 9 services, batch metrics migrated to .NET 8 OpenTelemetry, Grafana dashboards verified. I also wrote a 1,500-line architectural observability guide documenting the pattern, the decisions, and how to extend it for new services." },
      { t: 'text', l: 'Result', v: "The guide was adopted by the team as the standard. The org went from zero visibility to full coverage across every background service. I became the go-to person for observability questions on the team." },
      { t: 'terms', l: 'Key Terms', v: ['OpenTelemetry', 'IHealthCheck', 'Grafana', '.NET 8 metrics API', 'Windows Services'] },
      { t: 'fu', v: 'How did you get buy-in to spend time on this when it wasn\'t assigned work?' }
    ]
  },
  {
    id: 5, cat: 'behaviour', level: 'medium', resume: true, resumeRef: 'R02',
    q: 'Tell me about a production issue you resolved under pressure.',
    answer: [
      { t: 'text', l: 'Situation', v: "Duck Creek Billing — a high-traffic stored procedure handling receivable posting started causing carrier-reported blocking. Insurance carriers reporting it, production impacted, needed a fix fast." },
      { t: 'text', l: 'Action', v: "Root-cause analysis using SQL Server deadlock graphs and blocking chain traces. Found the SP was holding row locks for too long during intermediate calculations — it was reading, computing, and writing back in a way that caused circular lock dependencies under concurrent load. Refactored to use temp tables to stage intermediate results, then restructured the lock acquisition order to eliminate the circular dependency." },
      { t: 'text', l: 'Result', v: "Eliminated the blocking entirely. The fix was paired with regression tests covering the receivable posting path and shipped in the next monthly release." },
      { t: 'terms', l: 'Key Terms', v: ['deadlock graph', 'blocking chain', 'lock acquisition order', 'temp tables', 'SQL Server trace'] },
      { t: 'fu', v: 'How do you distinguish a deadlock from a blocking scenario — and does the fix differ?' }
    ]
  },
  {
    id: 6, cat: 'behaviour', level: 'medium', resume: true, resumeRef: 'R06',
    q: 'Tell me about a reusable component or framework you built that had broad impact.',
    answer: [
      { t: 'text', l: 'Situation', v: "At Magnit Global we needed to integrate 5 third-party HR APIs — Eightfold, DEI Candidate, Brainville, ICIMS, Engage. Each had different auth, different request shapes, different error formats. Every integration was being built ad-hoc with no shared structure and no audit trail." },
      { t: 'text', l: 'Action', v: "Built a reusable API integration framework — a shared HttpClient abstraction using DelegatingHandler, standardised error handling, and a logging layer that captured every outbound request and inbound response automatically. Every integration used the same wrapper — no per-integration boilerplate, full audit trail by default." },
      { t: 'text', l: 'Result', v: "5 integrations built using the same pattern. Full audit trail on all external API traffic. New integrations could be onboarded by following the pattern — no copy-paste logging code." },
      { t: 'terms', l: 'Key Terms', v: ['DelegatingHandler', 'HttpClient', 'Adapter pattern', 'audit logging', 'IHttpClientFactory'] },
      { t: 'fu', v: 'How did you handle authentication differences between the 5 APIs — did the framework abstract that too?' }
    ]
  },
  {
    id: 7, cat: 'dotnet', level: 'basic', resume: false,
    q: 'What is the difference between .NET Framework and .NET 8?',
    answer: [
      { t: 'text', l: 'Core Difference', v: ".NET Framework is Windows-only, ships with the OS, ended at version 4.8 — no new features. .NET Core / .NET 5+ (now just called .NET) is cross-platform (Windows, Linux, macOS), open source, ships independently of the OS, and gets new features every November. .NET 8 is the current LTS release (3-year support window)." },
      { t: 'text', l: 'Why it matters', v: "For any new system: .NET 8. It's faster, has better tooling, Minimal API support, better async performance, and gets ongoing investment. .NET Framework is maintenance mode — you only stay on it if you have a legacy constraint, like WCF-heavy systems or old COM dependencies." },
      { t: 'text', l: 'Where I stand', v: "My day job runs .NET Framework (company constraint). Every new system I build — including the EHS platform — is .NET 8." },
      { t: 'fu', v: 'What specific .NET 8 features have you used that weren\'t available in Framework?' }
    ]
  },
  {
    id: 8, cat: 'dotnet', level: 'basic', resume: false,
    q: 'Explain dependency injection and why it matters in .NET.',
    answer: [
      { t: 'text', l: 'What it is', v: "DI is a design pattern where a class declares what it needs (its dependencies via constructor parameters) and the DI container provides them. You register services in Program.cs and the runtime injects them wherever they're requested." },
      { t: 'text', l: 'The three lifetimes', v: "Transient — new instance every injection. Scoped — one instance per HTTP request (most common for services). Singleton — one instance for the application lifetime (caches, config readers)." },
      { t: 'text', l: 'Why it matters', v: "Decoupling: your class depends on an interface (IMyService), not a concrete type. Testability: inject a mock in tests. Lifetime management: the container manages object creation and disposal — you don't." },
      { t: 'terms', l: 'Key Terms', v: ['IServiceCollection', 'AddScoped', 'AddTransient', 'AddSingleton', 'constructor injection'] },
      { t: 'fu', v: 'What is a captive dependency and why is it dangerous?' }
    ]
  },
  {
    id: 9, cat: 'dotnet', level: 'medium', resume: false,
    q: 'What is async/await and how does it work under the hood in C#?',
    answer: [
      { t: 'text', l: 'What it is', v: "async/await is syntactic sugar over the Task Parallel Library (TPL). When you mark a method async and await a Task, you're telling the compiler to rewrite that method as a state machine." },
      { t: 'text', l: 'How it works', v: "The method runs synchronously until the first await that isn't already complete. At that point it returns a Task to the caller — the thread is released back to the pool. When the awaited operation completes, the runtime picks up a thread (from the thread pool, or the original sync context in UI apps) and resumes the state machine from where it paused." },
      { t: 'text', l: 'Key point', v: "async/await does NOT create new threads. It releases threads during I/O waits. This is what allows a web server to handle thousands of concurrent requests with a small thread pool — threads aren't blocked waiting for database queries." },
      { t: 'terms', l: 'Key Terms', v: ['state machine', 'Task', 'thread pool', 'SynchronizationContext', 'ConfigureAwait'] },
      { t: 'fu', v: 'What does ConfigureAwait(false) do and when should you use it?' }
    ]
  },
  {
    id: 10, cat: 'dotnet', level: 'medium', resume: false,
    q: 'What is the difference between IEnumerable, IQueryable, and ICollection?',
    answer: [
      { t: 'text', l: 'IEnumerable<T>', v: "Forward-only in-memory iteration. Once data is loaded into memory, LINQ operations (Where, Select) execute in-process on that data. Lowest abstraction." },
      { t: 'text', l: 'IQueryable<T>', v: "Builds an expression tree that the provider translates (EF Core → SQL). The WHERE clause happens at the database, not in your app. Critical: if you return IQueryable from a repo method, callers can compose queries and the SQL is built up lazily. If you ToList() too early, you pull everything into memory first." },
      { t: 'text', l: 'ICollection<T>', v: "Extends IEnumerable with Count, Add, Remove, Contains. Use for in-memory collections you need to modify or count without enumerating." },
      { t: 'text', l: 'The common mistake', v: "Calling .ToList() before applying a .Where() filter — EF fetches all rows, then C# filters in memory. For large tables this is a serious performance bug." },
      { t: 'fu', v: 'When would you return IQueryable from a repository method vs always materialising with ToList()?' }
    ]
  },
  {
    id: 11, cat: 'dotnet', level: 'advanced', resume: true, resumeRef: 'EHS Platform',
    q: 'Explain Clean Architecture — what are the layers and what are the rules between them?',
    answer: [
      { t: 'text', l: 'The Layers (inside → out)', v: "Domain → Application → Infrastructure → API. Domain has entities, value objects, domain events, business rules. No framework dependencies. Application has use cases (Commands/Queries), interfaces it needs (IRepository, ICacheService), DTOs. Infrastructure implements the interfaces (EF Core repos, Redis cache, email). API wires everything with DI, handles HTTP." },
      { t: 'text', l: 'The Rule', v: "Dependencies point inward only. Infrastructure can depend on Application. Application can depend on Domain. Domain depends on nothing. API depends on everything but contains no logic. This means business logic is framework-agnostic and testable in isolation." },
      { t: 'text', l: 'In practice — EHS Platform', v: "ICacheService is defined in Application. DistributedCacheService (Redis) is in Infrastructure. If I want to swap Redis for Dapr State at Phase 8, it's one DI registration line — zero changes to Application or Domain." },
      { t: 'terms', l: 'Key Terms', v: ['dependency rule', 'interface inversion', 'domain model', 'CQRS', 'MediatR'] },
      { t: 'fu', v: 'How do you handle cross-cutting concerns like logging and caching in Clean Architecture without polluting the domain?' }
    ]
  },
  {
    id: 12, cat: 'dotnet', level: 'advanced', resume: true, resumeRef: 'EHS Platform',
    q: 'What is CQRS? Why would you choose it over a traditional layered approach?',
    answer: [
      { t: 'text', l: 'What it is', v: "CQRS — Command Query Responsibility Segregation. Separates write operations (Commands) from read operations (Queries). Commands mutate state, return nothing or a confirmation. Queries return data, never mutate state." },
      { t: 'text', l: 'With MediatR', v: "Each Command is a class. Each Query is a class. Each has its own Handler. A Validator sits alongside. The controller sends a Command/Query to MediatR and gets a result — the controller knows nothing about how it's handled. One folder per use case: command file, handler file, validator file." },
      { t: 'text', l: 'When to use it', v: "When your read and write models differ significantly. When you have meaningful business logic in write paths. When you want handlers to stay small and focused. The honest trade-off: it's more code than a traditional Service class. For pure CRUD with no domain logic, it can be over-engineering." },
      { t: 'terms', l: 'Key Terms', v: ['IRequest', 'IRequestHandler', 'MediatR', 'FluentValidation', 'pipeline behaviour'] },
      { t: 'fu', v: 'How do you handle cross-cutting concerns like validation and logging in a CQRS pipeline?' }
    ]
  },
  {
    id: 13, cat: 'sql', level: 'basic', resume: false,

// ─── STATE ───────────────────────────────────────────────────────────────────

let state = {
  view: 'card',
  catFilter: 'all',
  levelFilter: 'all',
  idx: 0,
  revealed: false,
  scores: { nailed: 0, okay: 0, work: 0 }
};

function filtered() {
  return Q.filter(q => {
    const catOk = state.catFilter === 'all' || q.cat === state.catFilter;
    const lvlOk = state.levelFilter === 'all' || q.level === state.levelFilter;
    return catOk && lvlOk;
  });
}

// ─── FILTERS ─────────────────────────────────────────────────────────────────

function setFilter(type, val, btn) {
  if (type === 'cat') {
    state.catFilter = val;
    document.querySelectorAll('#catFilters .fbtn').forEach(b => b.classList.remove('on'));
  } else {
    state.levelFilter = val;
    document.querySelectorAll('#levelFilters .fbtn').forEach(b => b.classList.remove('on'));
  }
  btn.classList.add('on');
  state.idx = 0;
  state.revealed = false;
  render();
}

// ─── RENDER HELPERS ──────────────────────────────────────────────────────────

const CAT_META = {
  about:     { label: 'About You',       cls: 't-about' },
  dotnet:    { label: '.NET & C#',       cls: 't-dotnet' },
  sql:       { label: 'SQL & Databases', cls: 't-sql' },
  system:    { label: 'System Design',   cls: 't-system' },
  behaviour: { label: 'Behavioural',     cls: 't-behaviour' },
  remote:    { label: 'Remote Work',     cls: 't-remote' }
};

function tagHtml(cls, label) {
  return `<span class="tag ${cls}">${label}</span>`;
}

function answerHtml(sections) {
  return sections.map(s => {
    if (s.t === 'text') return `<div class="a-block"><div class="a-lbl">${s.l}</div><div class="a-text">${s.v}</div></div>`;
    if (s.t === 'terms') return `<div class="a-block"><div class="a-lbl">${s.l}</div><div class="a-terms">${s.v.map(t => `<span class="a-term">${t}</span>`).join('')}</div></div>`;
    if (s.t === 'fu') return `<div class="follow-up"><div class="fu-lbl">Follow-up they will ask</div><div class="fu-text">${s.v}</div></div>`;
    return '';
  }).join('');
}

// ─── CARD VIEW ───────────────────────────────────────────────────────────────

function render() {
  const list = filtered();
  const cardView = document.getElementById('cardView');
  const navBar = document.getElementById('navBar');
  const listView = document.getElementById('listView');

  document.getElementById('sNailed').textContent = state.scores.nailed;
  document.getElementById('sOkay').textContent   = state.scores.okay;
  document.getElementById('sWork').textContent   = state.scores.work;

  if (state.view === 'list') {
    cardView.classList.add('hidden');
    navBar.classList.add('hidden');
    listView.classList.remove('hidden');
    renderList(list);
    document.getElementById('counter').textContent = `${list.length} question${list.length !== 1 ? 's' : ''}`;
    return;
  }

  cardView.classList.remove('hidden');
  listView.classList.add('hidden');

  if (list.length === 0) {
    navBar.classList.add('hidden');
    document.getElementById('qCard').innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No questions match this filter</div></div>`;
    document.getElementById('counter').textContent = 'No cards';
    return;
  }

  navBar.classList.remove('hidden');
  if (state.idx >= list.length) state.idx = 0;

  const q = list[state.idx];
  const cat = CAT_META[q.cat];
  const levelCls = `t-${q.level}`;
  const levelLabel = q.level.charAt(0).toUpperCase() + q.level.slice(1);

  let tags = tagHtml(cat.cls, cat.label) + tagHtml(levelCls, levelLabel);
  if (q.resume) tags += tagHtml('t-resume', '📋 Resume-linked');
  if (q.tag) tags += tagHtml('t-ehs', '🏗 EHS');

  let cardHtml = `
    <div class="q-label">Question</div>
    <div class="q-tags">${tags}</div>
    <div class="q-text">${q.q}</div>
  `;

  if (!state.revealed) {
    cardHtml += `<div class="reveal-area" onclick="reveal()">Tap to reveal answer</div>`;
  } else {
    cardHtml += `
      <div class="answer">${answerHtml(q.answer)}</div>
      <div class="score-btns">
        <button class="sbtn sbtn-n" onclick="score('nailed')">✓ Nailed it</button>
        <button class="sbtn sbtn-o" onclick="score('okay')">~ Okay</button>
        <button class="sbtn sbtn-w" onclick="score('work')">✗ Need work</button>
      </div>
    `;
  }

  document.getElementById('qCard').innerHTML = cardHtml;

  const pos = state.idx + 1;
  const total = list.length;
  document.getElementById('counter').textContent = `Card ${pos} of ${total}`;
  document.getElementById('navPos').textContent = `${pos} / ${total}`;
  document.getElementById('btnPrev').disabled = state.idx === 0;
  document.getElementById('btnNext').disabled = state.idx === list.length - 1;
}

function reveal() {
  state.revealed = true;
  render();
}

function score(type) {
  state.scores[type]++;
  go(1);
}

function go(dir) {
  const list = filtered();
  const next = state.idx + dir;
  if (next >= 0 && next < list.length) {
    state.idx = next;
    state.revealed = false;
    render();
  }
}

// ─── LIST VIEW ───────────────────────────────────────────────────────────────

function renderList(list) {
  document.getElementById('listCount').textContent = `${list.length} question${list.length !== 1 ? 's' : ''}`;
  document.getElementById('listItems').innerHTML = list.map((q, i) => {
    const cat = CAT_META[q.cat];
    const levelLabel = q.level.charAt(0).toUpperCase() + q.level.slice(1);
    return `
      <div class="li" id="li-${q.id}">
        <div class="li-head" onclick="toggleListItem(${q.id})">
          <div class="li-num">${String(i + 1).padStart(2, '0')}</div>
          <div class="li-body">
            <div class="li-q">${q.q}</div>
            <div class="li-tags">
              ${tagHtml(cat.cls, cat.label)}
              ${tagHtml(`t-${q.level}`, levelLabel)}
              ${q.resume ? tagHtml('t-resume', '📋 Resume-linked') : ''}
              ${q.tag ? tagHtml('t-ehs', '🏗 EHS') : ''}
            </div>
          </div>
          <div class="li-chev">▶</div>
        </div>
        <div class="li-ans">${answerHtml(q.answer)}</div>
      </div>
    `;
  }).join('');
}

function toggleListItem(id) {
  const el = document.getElementById(`li-${id}`);
  el.classList.toggle('open');
}

// ─── VIEW TOGGLE ─────────────────────────────────────────────────────────────

function toggleView() {
  state.view = state.view === 'card' ? 'list' : 'card';
  const btn = document.getElementById('viewToggle');
  btn.textContent = state.view === 'card' ? 'List View' : 'Card View';
  btn.classList.toggle('active', state.view === 'list');
  render();
}

// ─── INIT ────────────────────────────────────────────────────────────────────

render();
</script>
