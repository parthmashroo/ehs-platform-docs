<head>

  <style>
    :root {
      --bg: #f0ebe2; --card: #ffffff; --border: #e2ddd6;

    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    .header-title { font-size: 22px; font-weight: 700; }
    .header-sub { font-size: 13px; color: var(--muted); margin-left: 4px; }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .card-counter { font-size: 14px; color: var(--secondary); font-weight: 500; }
    .view-btn { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text); transition: all 0.15s; }
    .view-btn:hover { background: #f5f0e8; }
    .view-btn.active { background: var(--active-bg); color: var(--active-text); border-color: var(--active-bg); }
    .filters { padding: 20px 28px 16px; max-width: 860px; margin: 0 auto; }
    .filter-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 8px; }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .fbtn { padding: 7px 16px; border-radius: 999px; border: 1px solid var(--border); background: var(--card); font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text); transition: all 0.15s; white-space: nowrap; }
    .fbtn:hover { border-color: #94a3b8; }
    .fbtn.on { background: var(--active-bg); color: white; border-color: var(--active-bg); }
    .fbtn.l-basic.on  { background: #16a34a; border-color: #16a34a; }
    .fbtn.l-medium.on { background: #d97706; border-color: #d97706; }
    .fbtn.l-advanced.on { background: #dc2626; border-color: #dc2626; }
    .card-view { padding: 0 28px 16px; max-width: 860px; margin: 0 auto; }

const Q = [
  {
    id: 1, topic: 'clean-arch', level: 'basic',
    q: 'What are the 4 layers of Clean Architecture and what is the single rule that governs all of them?',
    answer: [
      { t: 'text', l: 'The 4 layers', v: 'Domain: entities, enums, domain methods — zero external dependencies. Application: CQRS handlers, interface contracts, use cases — depends only on Domain. Infrastructure: EF Core, Redis, external APIs — implements Application interfaces. API: controllers, middleware — depends on Application via MediatR. Each is a separate project.' },
      { t: 'text', l: 'The one rule', v: 'Dependencies point inward only. Outer layers reference inner layers. Inner layers must never reference outer layers. If a handler ever imports Microsoft.EntityFrameworkCore, the rule is violated. If Infrastructure imports a controller type, the rule is violated. The compiler enforces this via project references — set them wrong and it does not build.' },
      { t: 'terms', l: 'Key terms', v: ['Dependency Rule', 'Domain', 'Application', 'Infrastructure', 'API layer', 'inward dependencies'] },
      { t: 'fu', v: 'IApplicationDbContext lives in Application, ApplicationDbContext lives in Infrastructure. Why that split — and what does it prevent?', fuLink: 2 }

  },
  {
    id: 2, topic: 'clean-arch', level: 'medium',
    q: 'IApplicationDbContext is defined in Application but implemented in Infrastructure. Why that split — and what architectural violation does it prevent?',
    answer: [
      { t: 'text', l: 'The split', v: 'Application defines the contract: DbSet<Incident> Incidents, DbSet<CorrectiveAction> CorrectiveActions, Task<int> SaveChangesAsync(). Infrastructure implements it: ApplicationDbContext extends DbContext AND implements IApplicationDbContext. Handlers inject IApplicationDbContext — they never import Microsoft.EntityFrameworkCore.' },
      { t: 'text', l: 'What it prevents', v: 'If handlers injected ApplicationDbContext directly, Application would depend on Infrastructure — the dependency rule reverses. Swapping the ORM, adding an InMemory test implementation, or extracting Application to a separate service would require touching every handler. The interface is the seam that makes all of that invisible to handlers.' },
      { t: 'text', l: 'In tests', v: 'Application.Tests uses an InMemory DbContext that implements IApplicationDbContext. The handler cannot tell the difference — it uses the same interface. No mocking needed for DB in handler tests.' },
      { t: 'terms', l: 'Key terms', v: ['IApplicationDbContext', 'DI seam', 'interface as boundary', 'InMemory provider', 'layer isolation'] },
      { t: 'fu', v: 'A developer proposes a shared Common project both Application and Infrastructure reference. What is the architectural problem?', fuLink: 3 }
    ]
  },
  {
    id: 3, topic: 'clean-arch', level: 'advanced',
    q: 'A developer proposes a shared "Common" project that both Application and Infrastructure can reference. What is the architectural problem — and how do you shut it down?',
    answer: [
      { t: 'text', l: 'The problem', v: 'A shared project creates implicit coupling. If someone adds an Infrastructure type to Common (DbContext base, Redis key constants, connection helpers), Application transitively depends on Infrastructure — the dependency rule breaks silently. The compiler does not catch it because the reference path is Application → Common ← Infrastructure, not Application → Infrastructure directly.' },
      { t: 'text', l: 'The correct alternative', v: 'Types shared across layers have exactly one right home: domain concepts (enums, value objects, base entity) belong in Domain. Application contracts (interfaces, DTOs, exceptions) belong in Application. Infrastructure knows about everything above it — it does not need to share upward. If you feel the pull toward a Common project, that is a signal of a conceptual gap in your layering.' },
      { t: 'terms', l: 'Key terms', v: ['transitive dependency', 'dependency inversion', 'shared kernel anti-pattern', 'layer boundary', 'implicit coupling'] },
      { t: 'fu', v: 'Which NuGet packages are allowed in each layer — and what happens if you install MediatR in the Infrastructure project?' }
    ]
  },
  {
    id: 4, topic: 'cqrs', level: 'basic',
    q: 'What is CQRS? Why separate commands from queries — what concrete problem does the separation solve?',
    answer: [
      { t: 'text', l: 'The pattern', v: 'Command Query Responsibility Segregation. Commands = writes (create, update, delete, status change). Queries = reads (get one, get list, search, aggregate). They are distinct request objects with distinct handlers — never mixed.' },
      { t: 'text', l: 'Why separate them', v: 'Commands need: FluentValidation, transaction management, domain rule enforcement, optimistic concurrency. Queries need: projections, pagination, caching, joins. When mixed in one service class, validation bleeds into read paths and query performance work bleeds into write paths. Separation lets each evolve independently — you can add Redis cache to a query handler without touching the command handler at all.' },
      { t: 'text', l: 'At scale', v: 'This system will have ~215 command/query folders by Phase 17. Each folder is one intent, one handler, one test surface. The alternative — a service class with 20 methods — becomes a 3000-line maintenance problem by year 2.' },
      { t: 'terms', l: 'Key terms', v: ['Command', 'Query', 'Handler', 'MediatR', 'ISender', 'separation of concerns'] },
      { t: 'fu', v: 'Walk me through every class that handles a POST /api/incidents request from controller to DB write.', fuLink: 5 }
    ]
  },
  {
    id: 5, topic: 'cqrs', level: 'medium',
    q: 'Walk me through every class that processes POST /api/incidents — from the HTTP request arriving to the row being committed to the database.',
    answer: [
      { t: 'text', l: 'The full chain', v: '1. CorrelationIdMiddleware: generates or reads X-Correlation-Id, pushes to Serilog LogContext. 2. ExceptionHandlingMiddleware: wraps the rest in try/catch, maps exceptions to Problem Details. 3. JWT middleware: validates signature, builds ClaimsPrincipal. 4. TenantResolutionMiddleware: reads tid claim, validates it is present. 5. IncidentsController.Create(): deserializes body into CreateIncidentCommand, calls ISender.Send(command, ct). 6. MediatR pipeline: ValidationBehaviour runs FluentValidation — throws 400 on failure. 7. CreateIncidentCommandHandler: creates Incident entity, stamps TenantId + ReportedById from ICurrentUserService, calls _context.SaveChangesAsync(). 8. EF Core emits INSERT to SQL Server. 9. Controller returns 201 Created with Location header.' },
      { t: 'terms', l: 'Key terms', v: ['middleware pipeline order', 'MediatR pipeline', 'ValidationBehaviour', 'ISender', 'ICurrentUserService', 'TenantResolutionMiddleware'] },
      { t: 'fu', v: 'Why use ISender in controllers instead of IMediator — what does IMediator expose that controllers should not access?', fuLink: 6 }
    ]
  },
  {
    id: 6, topic: 'cqrs', level: 'medium',
    q: 'Why does this system inject ISender into controllers instead of IMediator? What does IMediator expose that controllers should not touch?',
    answer: [
      { t: 'text', l: 'The difference', v: 'ISender exposes one method: Send(IRequest, CancellationToken). IMediator also exposes Publish() for domain events. Controllers have no business publishing domain events directly — that is a handler concern triggered after a command succeeds. Using IMediator would allow a developer to call Publish() from a controller, bypassing the command layer entirely.' },
      { t: 'text', l: 'Interface segregation', v: 'Give callers only what they need. Controllers need to dispatch requests and receive responses. Nothing else. The narrower the interface, the smaller the surface area for misuse. ISender is the interface segregation principle applied to the MediatR surface.' },
      { t: 'terms', l: 'Key terms', v: ['ISender', 'IMediator', 'Publish()', 'interface segregation principle', 'domain events', 'misuse prevention'] },
      { t: 'fu', v: 'Write a MediatR pipeline behaviour that logs the command name and execution time.', fuLink: 7 }
    ]
  },
  {
    id: 7, topic: 'cqrs', level: 'advanced', coding: true,
    q: 'CODING: Write a MediatR pipeline behaviour that measures and logs handler execution time. What interface do you implement, how do you register it, and does registration order matter?',
    answer: [
      { t: 'code', l: 'LoggingBehaviour', v: `public class LoggingBehaviour<TRequest, TResponse>
    : IPipelineBehavior<TRequest, TResponse>
    where TRequest : notnull
{
    private readonly ILogger<LoggingBehaviour<TRequest, TResponse>> _logger;

    public LoggingBehaviour(ILogger<LoggingBehaviour<TRequest, TResponse>> logger)
        => _logger = logger;

    public async Task<TResponse> Handle(
        TRequest request,
        RequestHandlerDelegate<TResponse> next,
        CancellationToken ct)
    {
        var name = typeof(TRequest).Name;
        var sw = Stopwatch.StartNew();
        var response = await next();
        _logger.LogInformation("{Command} completed in {Ms}ms",
            name, sw.ElapsedMilliseconds);
        return response;
    }
}` },
      { t: 'text', l: 'Registration', v: 'services.AddTransient(typeof(IPipelineBehavior<,>), typeof(LoggingBehaviour<,>)) in Application DI. The open generic covers all commands and queries automatically.' },
      { t: 'text', l: 'Registration order', v: 'Yes — order matters. MediatR runs behaviours in registration order. Register ValidationBehaviour first if you want validation to fail fast before timing begins. Register LoggingBehaviour second to time only the handler, not the validation step.' },
      { t: 'terms', l: 'Key terms', v: ['IPipelineBehavior<TRequest,TResponse>', 'RequestHandlerDelegate', 'open generic registration', 'Stopwatch', 'pipeline ordering'] },
      { t: 'fu', v: 'What is the difference between a behaviour that wraps next() vs one that short-circuits before calling next()? When would you short-circuit?' }
    ]
  },
  {
    id: 8, topic: 'ef-core', level: 'basic',
    q: 'What is a Code-First migration? What does "add migration" generate, what does "database update" execute, and what should you always check before running update?',
    answer: [
      { t: 'text', l: 'What add migration generates', v: '"dotnet ef migrations add AddWorkPermit" diffs the current DbContext model against the last migration snapshot (_ModelSnapshot.cs). It generates a C# class with Up() — the forward change (CREATE TABLE, ADD COLUMN, ADD INDEX) — and Down() — the rollback (DROP TABLE, DROP COLUMN).' },
      { t: 'text', l: 'What database update does', v: 'Executes all pending Up() methods in order. EF tracks applied migrations in __EFMigrationsHistory table. Running update twice is safe — it skips already-applied migrations. If the table does not exist, EF creates it first.' },
      { t: 'text', l: 'Always review before update', v: 'Check: correct table name, correct column types and nullability, FK constraints present, no unexpected DROP statements from unintended model changes, filtered indexes where needed. A migration that drops a column in production is hard to undo.' },
      { t: 'terms', l: 'Key terms', v: ['migration', '_ModelSnapshot', 'Up()', 'Down()', '__EFMigrationsHistory', 'Code-First'] },
      { t: 'fu', v: 'What is optimistic concurrency and how does RowVersion implement it at the SQL level?', fuLink: 9 }
    ]
  },
  {
    id: 9, topic: 'ef-core', level: 'medium',
    q: 'What is optimistic concurrency? How does RowVersion implement it in SQL Server — what SQL does EF Core actually emit?',
    answer: [
      { t: 'text', l: 'Optimistic concurrency', v: 'Assumes conflicts are rare. Instead of locking the row on read (pessimistic), it checks at write time: has anyone modified this row since I read it? If yes, reject the write — do not silently overwrite their change.' },
      { t: 'text', l: 'How RowVersion works', v: 'RowVersion is a SQL Server timestamp column: an 8-byte value SQL Server auto-increments atomically on every write, regardless of which columns changed. EF reads the original rowversion when you fetch the entity. On UPDATE, EF emits: UPDATE Incidents SET ... WHERE Id = @id AND RowVersion = @originalRowVersion. If another writer committed first, their rowversion changed — EF finds 0 rows affected and throws DbUpdateConcurrencyException.' },
      { t: 'text', l: 'In this API', v: 'DbUpdateConcurrencyException is caught in ExceptionHandlingMiddleware and mapped to 409 Conflict. The client must re-fetch the resource with its current rowversion and retry. Phase 8 exposes rowversion as an ETag header so the client can detect staleness before submitting.' },
      { t: 'terms', l: 'Key terms', v: ['optimistic concurrency', 'RowVersion', 'timestamp column', 'DbUpdateConcurrencyException', '409 Conflict', 'ETag'] },
      { t: 'fu', v: 'CODING: Write the EF configuration for an entity with RowVersion, combined soft-delete + tenant filter, and a filtered unique index.', fuLink: 10 }
    ]
  },
  {
    id: 10, topic: 'ef-core', level: 'advanced', coding: true,
    q: 'CODING: Write the EF Core configuration for a WorkPermit entity: RowVersion, a combined TenantId + IsDeleted query filter, and a filtered unique index on (TenantId, PermitNumber) that ignores soft-deleted rows.',
    answer: [
      { t: 'code', l: 'WorkPermitConfiguration', v: `public class WorkPermitConfiguration : IEntityTypeConfiguration<WorkPermit>
{
    public void Configure(EntityTypeBuilder<WorkPermit> builder)
    {
        builder.ToTable("WorkPermits");
        builder.HasKey(x => x.Id);
        builder.Property(x => x.PermitNumber).IsRequired().HasMaxLength(50);
        builder.Property(x => x.IsDeleted).IsRequired().HasDefaultValue(false);
        builder.Property(x => x.CreatedAt).IsRequired();
        builder.Property(x => x.UpdatedAt).IsRequired();
        builder.Property(x => x.RowVersion).IsRowVersion();

        // Single HasQueryFilter call — calling it twice silently discards the first
        builder.HasQueryFilter(x => !x.IsDeleted && x.TenantId == _tenantId);

        // Filtered index: unique among active records only
        // Without HasFilter, soft-deleted rows block permit number reuse
        builder.HasIndex(x => new { x.TenantId, x.PermitNumber })
            .IsUnique()
            .HasFilter("[IsDeleted] = 0");
    }

let state = { view: 'card', topicFilter: 'all', levelFilter: 'all', idx: 0, revealed: false };

function filtered() {
  return Q.filter(q => {
    const tOk = state.topicFilter === 'all' || q.topic === state.topicFilter;
    const lOk = state.levelFilter === 'all' || q.level === state.levelFilter;
    return tOk && lOk;
  });
}

function setFilter(type, val, btn) {
  if (type === 'topic') {
    state.topicFilter = val;
    document.querySelectorAll('#topicFilters .fbtn').forEach(b => b.classList.remove('on'));
  } else {
    state.levelFilter = val;
    document.querySelectorAll('#levelFilters .fbtn').forEach(b => b.classList.remove('on'));
  }
  btn.classList.add('on');
  state.idx = 0;
  state.revealed = false;
  render();
}

function tagHtml(cls, label) {
  return `<span class="tag ${cls}">${label}</span>`;
}

function answerHtml(sections) {
  return sections.map(s => {
    if (s.t === 'text') return `<div class="a-block"><div class="a-lbl">${s.l}</div><div class="a-text">${s.v}</div></div>`;
    if (s.t === 'code') return `<div class="a-block"><div class="a-lbl">${s.l}</div><pre class="a-code">${escHtml(s.v)}</pre></div>`;
    if (s.t === 'terms') return `<div class="a-block"><div class="a-lbl">${s.l}</div><div class="a-terms">${s.v.map(t => `<span class="a-term">${t}</span>`).join('')}</div></div>`;
    if (s.t === 'fu') {
      const link = s.fuLink ? `<span class="fu-link" onclick="goToQuestion(${s.fuLink})">Jump to that question →</span>` : '';
      return `<div class="follow-up"><div class="fu-lbl">Follow-up they will ask</div><div class="fu-text">${s.v}</div>${link}</div>`;
    }
    return '';
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

  const list = Q;
  const idx = list.findIndex(q => q.id === id);
  if (idx !== -1) { state.idx = idx; state.revealed = false; state.view = 'card'; render(); }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function render() {
  const list = filtered();
  const cardView = document.getElementById('cardView');
  const navBar = document.getElementById('navBar');
  const listView = document.getElementById('listView');

  if (state.view === 'list') {
    cardView.classList.add('hidden');
    navBar.classList.add('hidden');
    listView.classList.remove('hidden');
    renderList(list);
    document.getElementById('counter').textContent = `${list.length} question${list.length !== 1 ? 's' : ''}`;
    return;
  }

  cardView.classList.remove('hidden');
  listView.classList.add('hidden');

  if (list.length === 0) {
    navBar.classList.add('hidden');
    document.getElementById('qCard').innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No questions match this filter</div></div>`;
    document.getElementById('counter').textContent = 'No cards';
    return;
  }

  navBar.classList.remove('hidden');
  if (state.idx >= list.length) state.idx = 0;

  const q = list[state.idx];
  const topic = TOPIC_META[q.topic];
  const levelLabel = q.level.charAt(0).toUpperCase() + q.level.slice(1);

  let tags = tagHtml(topic.cls, topic.label) + tagHtml(`t-${q.level}`, levelLabel);
  if (q.coding) tags += tagHtml('t-coding', '{ } Coding');

  let html = `<div class="q-label">Question ${q.id} of ${Q.length}</div><div class="q-tags">${tags}</div><div class="q-text">${q.q}</div>`;

  if (!state.revealed) {
    html += `<div class="reveal-area" onclick="reveal()">Tap to reveal answer</div>`;
  } else {
    html += `<div class="answer">${answerHtml(q.answer)}</div>`;
  }

  document.getElementById('qCard').innerHTML = html;

  const pos = state.idx + 1;
  const total = list.length;
  document.getElementById('counter').textContent = `Card ${pos} of ${total}`;
  document.getElementById('navPos').textContent = `${pos} / ${total}`;
  document.getElementById('btnPrev').disabled = state.idx === 0;
  document.getElementById('btnNext').disabled = state.idx === list.length - 1;
}

function reveal() { state.revealed = true; render(); }

function go(dir) {
  const list = filtered();
  const next = state.idx + dir;
  if (next >= 0 && next < list.length) { state.idx = next; state.revealed = false; render(); }
}

function renderList(list) {
  document.getElementById('listCount').textContent = `${list.length} question${list.length !== 1 ? 's' : ''}`;
  document.getElementById('listItems').innerHTML = list.map((q, i) => {
    const topic = TOPIC_META[q.topic];
    const levelLabel = q.level.charAt(0).toUpperCase() + q.level.slice(1);
    return `
      <div class="li" id="li-${q.id}">
        <div class="li-head" onclick="toggleListItem(${q.id})">
          <div class="li-num">${String(i + 1).padStart(2, '0')}</div>
          <div class="li-body">
            <div class="li-q">${q.q}</div>
            <div class="li-tags">
              ${tagHtml(topic.cls, topic.label)}
              ${tagHtml(`t-${q.level}`, levelLabel)}
              ${q.coding ? tagHtml('t-coding', '{ } Coding') : ''}
            </div>
          </div>
          <div class="li-chev">▶</div>
        </div>
        <div class="li-ans">${answerHtml(q.answer)}</div>
      </div>`;
  }).join('');
}

function toggleListItem(id) { document.getElementById(`li-${id}`).classList.toggle('open'); }

function toggleView() {
  state.view = state.view === 'card' ? 'list' : 'card';
  const btn = document.getElementById('viewToggle');
  btn.textContent = state.view === 'card' ? 'List View' : 'Card View';
  btn.classList.toggle('active', state.view === 'list');
  render();
}

render();
</script>
</body>
</html>
